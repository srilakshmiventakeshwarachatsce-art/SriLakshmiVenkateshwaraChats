<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 300" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">
  <!-- ===== Horizontal lockup (mark + wordmark) — for light backgrounds ===== -->
  <defs>
    <linearGradient id="hg-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe27a"/><stop offset="1" stop-color="#f6941d"/>
    </linearGradient>
    <linearGradient id="hg-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f9e3f"/><stop offset="1" stop-color="#237a23"/>
    </linearGradient>
    <radialGradient id="hg-field" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#6a1a18"/><stop offset="1" stop-color="#4a1010"/>
    </radialGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(150 150)">
    <circle r="140" fill="#360a0a"/>
    <circle r="134" fill="url(#hg-field)"/>
    <circle r="136" fill="none" stroke="url(#hg-gold)" stroke-width="5"/>
    <circle r="112" fill="none" stroke="#ffb627" stroke-width="2" stroke-opacity="0.6"/>
    <text x="0" y="-62" text-anchor="middle" font-size="26" fill="#ffd447" font-family="'Noto Sans Kannada','Kannada Sangam MN',sans-serif">ಶ್ರೀ</text>
    <g transform="translate(0 6)">
      <ellipse cx="0" cy="34" rx="78" ry="14" fill="#000" opacity="0.2"/>
      <ellipse cx="0" cy="16" rx="82" ry="32" fill="url(#hg-leaf)"/>
      <ellipse cx="0" cy="16" rx="82" ry="32" fill="none" stroke="#1c5c1c" stroke-width="2.5"/>
      <g stroke="#b5761f" stroke-width="2.5">
        <g transform="translate(-46 4)"><circle r="23" fill="#e7a54e"/><ellipse cx="-7" cy="-8" rx="7" ry="4" fill="#ffe0a3" stroke="none"/><circle cx="0" cy="-23" r="5.5" fill="#2f9e44" stroke="none"/></g>
        <g transform="translate(0 -4)"><circle r="27" fill="#eaa94f"/><ellipse cx="-8" cy="-9" rx="8" ry="5" fill="#ffe0a3" stroke="none"/><circle cx="0" cy="-27" r="6" fill="#e63914" stroke="none"/></g>
        <g transform="translate(46 4)"><circle r="23" fill="#e7a54e"/><ellipse cx="-7" cy="-8" rx="7" ry="4" fill="#ffe0a3" stroke="none"/><circle cx="0" cy="-23" r="5.5" fill="#2f9e44" stroke="none"/></g>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="312" y="108" font-size="66" fill="#4a1010" letter-spacing="1">SRI LAKSHMI</text>
    <text x="312" y="170" font-size="54" fill="#b5300f" letter-spacing="1">VENKATESHWARA</text>
    <rect x="312" y="196" width="322" height="50" rx="25" fill="url(#hg-gold)"/>
    <text x="473" y="231" text-anchor="middle" font-size="31" fill="#4a1010" letter-spacing="4">CHATS CENTRE</text>
    <text x="662" y="230" font-size="24" fill="#237a37" font-family="'Trebuchet MS',Arial,sans-serif">Fresh &amp; Tasty Chaats</text>
  </g>
</svg>
